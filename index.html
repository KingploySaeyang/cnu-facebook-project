<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CnuFacebookBlazor</title>
    <link rel="stylesheet" href="app.css" />
    <link rel="stylesheet" href="CnuFacebookBlazor.styles.css" />
    <base href="/cnu-facebook-project/" />
</head>

<body>
    <div id="app">
        <div style="position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); font-family:sans-serif; text-align:center;">
            <div style="border:16px solid #f3f3f3; border-top:16px solid #3498db; border-radius:50%; width:120px; height:120px; animation:spin 2s linear infinite; margin:0 auto 20px;"></div>
            <h3 style="color:#555;">กำลังโหลดหน้าบ้านสักครู่นะคะ... 🐳✨</h3>
        </div>
    </div>

    <style>
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>

    <script src="_framework/blazor.web.js"></script>
</body>

</html>
